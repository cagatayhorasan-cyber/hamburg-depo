services:
  app:
    build: .
    container_name: hamburg-depo-app
    restart: unless-stopped
    env_file:
      - .env
    environment:
      NODE_ENV: production
      HOST: 0.0.0.0
      PORT: 3000
      DATA_DIR: /app/data
      SQLITE_PATH: /app/data/hamburg-depo.sqlite
      QUOTES_DIR: /app/exports/quotes
    volumes:
      - ./data:/app/data
      - ./exports:/app/exports
    expose:
      - "3000"

  nginx:
    image: nginx:1.27-alpine
    container_name: hamburg-depo-nginx
    restart: unless-stopped
    depends_on:
      - app
    ports:
      - "80:80"
    volumes:
      - ./deploy/nginx.conf:/etc/nginx/conf.d/default.conf:ro

